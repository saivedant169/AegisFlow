apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-aegisflow
  labels:
    app: aegisflow
    release: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: aegisflow
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: aegisflow
        release: {{ .Release.Name }}
    spec:
      containers:
        - name: aegisflow
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: AEGISFLOW_CONFIG
              value: /etc/aegisflow/aegisflow.yaml
          ports:
            - name: gateway
              containerPort: {{ .Values.service.gateway.port }}
              protocol: TCP
            - name: admin
              containerPort: {{ .Values.service.admin.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: gateway
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: gateway
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/aegisflow
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-config
