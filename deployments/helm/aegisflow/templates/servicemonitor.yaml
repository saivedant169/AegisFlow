{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Release.Name }}-aegisflow
  labels:
    app: aegisflow
    release: {{ .Release.Name }}
spec:
  selector:
    matchLabels:
      app: aegisflow
      release: {{ .Release.Name }}
  endpoints:
    - port: admin
      path: /metrics
      interval: {{ .Values.serviceMonitor.interval }}
{{- end }}
