apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: aegisflowtenants.aegisflow.io
spec:
  group: aegisflow.io
  names:
    kind: AegisFlowTenant
    listKind: AegisFlowTenantList
    plural: aegisflowtenants
    singular: aegisflowtenant
    shortNames: [aft]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                displayName:
                  type: string
                apiKeySecrets:
                  type: array
                  items:
                    type: object
                    required: [name, key]
                    properties:
                      name:
                        type: string
                      key:
                        type: string
                rateLimit:
                  type: object
                  properties:
                    requestsPerMinute:
                      type: integer
                    tokensPerMinute:
                      type: integer
                allowedModels:
                  type: array
                  items:
                    type: string
                budget:
                  type: object
                  properties:
                    monthly:
                      type: number
                      format: double
                    alertAt:
                      type: integer
                    warnAt:
                      type: integer
                    models:
                      type: object
                      additionalProperties:
                        type: object
                        properties:
                          monthly:
                            type: number
                            format: double
                          alertAt:
                            type: integer
                          warnAt:
                            type: integer
            status:
              type: object
              properties:
                totalRequests:
                  type: integer
                  format: int64
                totalTokens:
                  type: integer
                  format: int64
                estimatedCost:
                  type: number
                  format: double
                budgetPercentage:
                  type: number
                  format: double
                rateLimitUtilization:
                  type: integer
      additionalPrinterColumns:
        - name: Requests
          type: integer
          jsonPath: .status.totalRequests
        - name: Budget
          type: number
          jsonPath: .status.budgetPercentage
        - name: Rate-Limit
          type: integer
          jsonPath: .status.rateLimitUtilization
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
