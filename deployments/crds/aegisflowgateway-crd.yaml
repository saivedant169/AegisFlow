apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: aegisflowgateways.aegisflow.io
spec:
  group: aegisflow.io
  names:
    kind: AegisFlowGateway
    listKind: AegisFlowGatewayList
    plural: aegisflowgateways
    singular: aegisflowgateway
    shortNames: [afg]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                server:
                  type: object
                  properties:
                    port:
                      type: integer
                    adminPort:
                      type: integer
                logging:
                  type: object
                  properties:
                    level:
                      type: string
                    format:
                      type: string
                telemetry:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    exporter:
                      type: string
                cache:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    backend:
                      type: string
                    ttl:
                      type: string
                    maxSize:
                      type: integer
                database:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    connStringSecret:
                      type: object
                      properties:
                        name:
                          type: string
                        key:
                          type: string
                      required: [name, key]
                admin:
                  type: object
                  properties:
                    tokenSecret:
                      type: object
                      properties:
                        name:
                          type: string
                        key:
                          type: string
                      required: [name, key]
            status:
              type: object
              properties:
                ready:
                  type: boolean
                totalRequests:
                  type: integer
                  format: int64
                activeTenants:
                  type: integer
                lastSyncedAt:
                  type: string
      additionalPrinterColumns:
        - name: Ready
          type: boolean
          jsonPath: .status.ready
        - name: Requests
          type: integer
          jsonPath: .status.totalRequests
        - name: Tenants
          type: integer
          jsonPath: .status.activeTenants
        - name: Synced
          type: string
          jsonPath: .status.lastSyncedAt
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
